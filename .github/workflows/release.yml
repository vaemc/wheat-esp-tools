name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_SLUG: wheat-esp-tools
  APP_TITLE: Wheat ESP Tools

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').package.version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        run: yarn tauri build ${{ matrix.args }}

      - name: Rename release assets
        shell: bash
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
        run: node .github/scripts/rename-release-assets.mjs "${{ matrix.platform }}" "${{ steps.version.outputs.version }}"

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SLUG="${{ env.APP_SLUG }}"
          TITLE="${{ env.APP_TITLE }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "${TITLE} v${VERSION}" \
              --notes "多平台安装包（自动构建）

          | 平台 | 文件名示例 |
          | --- | --- |
          | Windows x64 | \`${SLUG}-${VERSION}-windows-x64.msi\` / \`${SLUG}-${VERSION}-windows-x64-setup.exe\` |
          | Linux amd64 | \`${SLUG}-${VERSION}-linux-amd64.deb\` / \`${SLUG}-${VERSION}-linux-amd64.AppImage\` |
          | macOS arm64 | \`${SLUG}-${VERSION}-macos-aarch64.dmg\` |"
          fi

          shopt -s nullglob
          FILES=(
            src-tauri/target/release/bundle/msi/${SLUG}-${VERSION}-windows-x64.msi
            src-tauri/target/release/bundle/nsis/${SLUG}-${VERSION}-windows-x64-setup.exe
            src-tauri/target/release/bundle/deb/${SLUG}-${VERSION}-linux-amd64.deb
            src-tauri/target/release/bundle/appimage/${SLUG}-${VERSION}-linux-amd64.AppImage
            src-tauri/target/release/bundle/dmg/${SLUG}-${VERSION}-macos-aarch64.dmg
          )
          UPLOAD=()
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              UPLOAD+=("$file")
            fi
          done
          if [ ${#UPLOAD[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          gh release upload "$TAG" "${UPLOAD[@]}" --clobber
