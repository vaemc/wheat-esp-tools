# 发版 + 应用内静默更新：
# 1. 改 src-tauri/tauri.conf.json 的 version（如 1.0.1）并推送到仓库
# 2. Actions → Build Release → Run workflow（无需手动建 Release）
# 3. 工作流自动创建 tag=v{version}、title={version} 的 Release，签名构建并上传，生成 latest.json
# 4. 客户端 check() → 确认 → downloadAndInstall() → relaunch()
#
# 必需 Secret：
#   TAURI_SIGNING_PRIVATE_KEY = .tauri-keys/wheat-esp-tools.key 文件全文
#
# 不会在 push main 时自动发版。

name: Build Release
run-name: Build Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Must match src-tauri/tauri.conf.json (e.g. 1.0.1)"
        required: true
        type: string

env:
  APP_SLUG: wheat-esp-tools
  APP_TITLE: Wheat ESP Tools

jobs:
  prepare:
    name: Prepare v${{ inputs.version }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version from tauri.conf.json
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tauri.conf.json version: ${VERSION}"
            exit 1
          fi
          if [ "${INPUT_VERSION}" != "${VERSION}" ]; then
            echo "Version mismatch."
            echo "  workflow input     : ${INPUT_VERSION}"
            echo "  tauri.conf.json    : ${VERSION}"
            echo "Re-run with the same version as tauri.conf.json."
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Tauri version=${VERSION} -> release tag=${TAG}"

      - name: Create GitHub Release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; will upload assets to it."
          else
            gh release create "${TAG}" \
              --title "${VERSION}" \
              --target "${GITHUB_SHA}" \
              --generate-notes
            echo "Created release ${TAG} (title=${VERSION})"
          fi

  release:
    name: Build Release ${{ needs.prepare.outputs.tag }} (${{ matrix.platform }})
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            updater_key: windows-x86_64
          - platform: ubuntu-22.04
            args: ""
            updater_key: linux-x86_64
          - platform: macos-latest
            args: ""
            updater_key: darwin-aarch64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require updater signing key
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "Missing secret TAURI_SIGNING_PRIVATE_KEY"
            echo "Add the full contents of .tauri-keys/wheat-esp-tools.key to GitHub Actions Secrets."
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libudev-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app (signed updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: yarn tauri build ${{ matrix.args }}

      - name: Rename release assets
        shell: bash
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/rename-release-assets.mjs "${{ matrix.platform }}" "${{ needs.prepare.outputs.version }}"

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          if [ ! -s .github/release-assets.txt ]; then
            echo "No release assets found"
            find src-tauri/target -path '*/bundle/*' -type f 2>/dev/null || true
            exit 1
          fi

          UPLOAD=()
          while IFS= read -r file; do
            if [ -n "${file}" ] && [ -f "${file}" ]; then
              UPLOAD+=("${file}")
            fi
          done < .github/release-assets.txt

          if [ ${#UPLOAD[@]} -eq 0 ]; then
            echo "Release asset list is empty"
            exit 1
          fi

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} not found"
            exit 1
          fi

          gh release upload "${TAG}" "${UPLOAD[@]}" --clobber
          echo "Uploaded ${#UPLOAD[@]} file(s) to ${TAG}"

      - name: Prepare updater meta artifact
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s .github/updater-platform.json ]; then
            echo "Missing .github/updater-platform.json"
            exit 1
          fi
          cp .github/updater-platform.json ".github/updater-platform-${{ matrix.updater_key }}.json"

      - name: Upload updater platform meta
        uses: actions/upload-artifact@v4
        with:
          name: updater-meta-${{ matrix.updater_key }}
          path: .github/updater-platform-${{ matrix.updater_key }}.json
          if-no-files-found: error

  latest-json:
    name: Publish latest.json (${{ needs.prepare.outputs.tag }})
    needs: [prepare, release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download updater meta artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-meta-*
          path: .github/updater-meta
          merge-multiple: true

      - name: Normalize updater meta filenames
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/updater-meta-norm
          i=0
          while IFS= read -r -d '' file; do
            i=$((i + 1))
            cp "${file}" ".github/updater-meta-norm/platform-${i}.json"
            echo "Found meta: ${file}"
            cat "${file}"
          done < <(find .github/updater-meta -type f -name '*.json' -print0)

          count=$(find .github/updater-meta-norm -type f -name '*.json' | wc -l)
          if [ "${count}" -lt 1 ]; then
            echo "No updater meta json found"
            find .github/updater-meta -type f || true
            exit 1
          fi

      - name: Build latest.json
        run: node .github/scripts/build-latest-json.mjs "${{ needs.prepare.outputs.version }}" .github/updater-meta-norm latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} not found"
            exit 1
          fi
          gh release upload "${TAG}" latest.json --clobber
          echo "Uploaded latest.json to ${TAG}"
          cat latest.json
